server {
    listen 80;
    server_name localhost;

    # Laravel の public ディレクトリをデフォルトルートに設定
    root /var/www/html/public;
    index index.php;

    client_max_body_size 500M;

    # PHP-FPM ハンドラ（最優先でマッチ）
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Laravel API・Sanctum・ヘルスチェック・メール確認 ルート
    location ~ ^/(api|sanctum|up|email)(/|$) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 公開ブログ詳細: /blog/[slug]/ → /_/ プレースホルダーページで処理
    # (output:export では generateStaticParams に無いslugは静的生成不可のため)
    location ~ ^/blog/[^/]+/$ {
        root /var/www/static;
        try_files /blog/_/index.html @nextjs_blog_detail;
    }
    location @nextjs_blog_detail {
        rewrite ^ /blog/_/ break;
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 公開声優登竜門 詳細: /podcast/[id]/ → /_/ プレースホルダー
    location ~ ^/podcast/[^/]+/$ {
        root /var/www/static;
        try_files /podcast/_/index.html @nextjs_podcast_detail;
    }
    location @nextjs_podcast_detail {
        rewrite ^ /podcast/_/ break;
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 会員限定ポッドキャスト（裏トーク）詳細: 同様の処理
    location ~ ^/members/podcast/[^/]+/$ {
        root /var/www/static;
        try_files /members/podcast/_/index.html @nextjs_members_podcast_detail;
    }
    location @nextjs_members_podcast_detail {
        rewrite ^ /members/podcast/_/ break;
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 会員限定ブログ詳細: 同様の処理
    location ~ ^/members/blog/[^/]+/$ {
        root /var/www/static;
        try_files /members/blog/_/index.html @nextjs_members_blog_detail;
    }
    location @nextjs_members_blog_detail {
        rewrite ^ /members/blog/_/ break;
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js フロントエンド（静的ビルドがあればそちらを優先）
    location / {
        root /var/www/static;
        try_files $uri $uri/ @nextjs;
    }

    # Next.js Dev サーバーへのフォールバック
    location @nextjs {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
